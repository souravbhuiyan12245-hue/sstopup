<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#4F46E5"/>
    </linearGradient>
    <linearGradient id="dG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38BDF8"/>
      <stop offset="50%" style="stop-color:#818CF8"/>
      <stop offset="100%" style="stop-color:#C084FC"/>
    </linearGradient>
    <linearGradient id="sG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F97316"/>
      <stop offset="100%" style="stop-color:#FBBF24"/>
    </linearGradient>
    <linearGradient id="boltG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FDE68A"/>
      <stop offset="100%" style="stop-color:#F59E0B"/>
    </linearGradient>
    <filter id="gl">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gl2">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ds">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bgG)"/>
  
  <!-- Background pattern circles -->
  <circle cx="400" cy="100" r="140" fill="rgba(255,255,255,0.04)"/>
  <circle cx="100" cy="420" r="100" fill="rgba(255,255,255,0.03)"/>
  <circle cx="256" cy="256" r="200" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  
  <!-- Main Diamond - large, centered -->
  <g filter="url(#gl2)">
    <polygon points="256,55 345,165 256,295 167,165" fill="url(#dG)" opacity="0.95"/>
  </g>
  <!-- Diamond facets -->
  <polygon points="256,55 345,165 256,165" fill="rgba(255,255,255,0.35)"/>
  <polygon points="256,55 167,165 256,165" fill="rgba(255,255,255,0.2)"/>
  <polygon points="167,165 256,295 256,165" fill="rgba(99,102,241,0.4)"/>
  <polygon points="345,165 256,295 256,165" fill="rgba(79,70,229,0.5)"/>
  <!-- Diamond inner shine -->
  <polygon points="256,80 310,165 256,165" fill="rgba(255,255,255,0.15)"/>
  
  <!-- Lightning bolt through diamond -->
  <g filter="url(#gl)">
    <polygon points="270,100 240,175 265,175 235,260 300,165 275,165 305,100" fill="url(#boltG)" opacity="0.9"/>
  </g>
  
  <!-- Small floating diamonds -->
  <g filter="url(#gl)" opacity="0.7">
    <polygon points="110,100 120,120 110,115 100,120" fill="#38BDF8"/>
  </g>
  <g filter="url(#gl)" opacity="0.5">
    <polygon points="400,90 408,106 400,102 392,106" fill="#C084FC"/>
  </g>
  <g filter="url(#gl)" opacity="0.6">
    <polygon points="130,230 138,245 130,241 122,245" fill="#818CF8"/>
  </g>
  <g filter="url(#gl)" opacity="0.4">
    <polygon points="385,220 392,233 385,230 378,233" fill="#38BDF8"/>
  </g>
  
  <!-- Sparkle dots -->
  <circle cx="150" cy="70" r="3" fill="#fff" opacity="0.6"/>
  <circle cx="370" cy="60" r="2.5" fill="#fff" opacity="0.5"/>
  <circle cx="420" cy="170" r="2" fill="#FBBF24" opacity="0.7"/>
  <circle cx="90" cy="180" r="2" fill="#38BDF8" opacity="0.5"/>
  <circle cx="350" cy="280" r="2.5" fill="#C084FC" opacity="0.4"/>
  <circle cx="160" cy="290" r="2" fill="#fff" opacity="0.3"/>
  
  <!-- "SS" text with orange gradient -->
  <text x="256" y="395" text-anchor="middle" font-family="Inter, Arial Black, sans-serif" font-size="105" font-weight="900" fill="url(#sG)" filter="url(#ds)" letter-spacing="-4">SS</text>
  
  <!-- "TOP-UP" text -->
  <text x="256" y="458" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="700" fill="rgba(255,255,255,0.9)" letter-spacing="8">TOP-UP</text>
  
  <!-- Underline accent -->
  <rect x="178" y="468" width="156" height="3" rx="1.5" fill="url(#sG)" opacity="0.6"/>
</svg>
