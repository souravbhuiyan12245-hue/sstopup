<svg viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#120e2a"/>
    </linearGradient>
    <linearGradient id="diamondGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6"/>
      <stop offset="50%" style="stop-color:#6C3CE1"/>
      <stop offset="100%" style="stop-color:#4F46E5"/>
    </linearGradient>
    <linearGradient id="diamondShine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#6C3CE1"/>
    </linearGradient>
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="outerGlow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feFlood flood-color="#6C3CE1" flood-opacity="0.4"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="6" stdDeviation="16" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="textGlow">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#6C3CE1" flood-opacity="0.5"/>
    </filter>
    <clipPath id="roundClip">
      <rect width="800" height="800" rx="160" ry="160"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" rx="160" ry="160" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" clip-path="url(#roundClip)">
    <line x1="0" y1="200" x2="800" y2="200" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="400" x2="800" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="600" x2="800" y2="600" stroke="#fff" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="800" stroke="#fff" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="800" stroke="#fff" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="800" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Glow circle behind diamond -->
  <circle cx="400" cy="320" r="180" fill="#6C3CE1" opacity="0.08"/>
  <circle cx="400" cy="320" r="120" fill="#6C3CE1" opacity="0.06"/>

  <!-- Diamond shape -->
  <g filter="url(#outerGlow)">
    <!-- Diamond body -->
    <polygon points="400,130 540,280 400,510 260,280" fill="url(#diamondGrad)" filter="url(#softShadow)"/>
    <!-- Diamond top facet -->
    <polygon points="400,130 540,280 400,240 260,280" fill="url(#diamondShine)" opacity="0.6"/>
    <!-- Diamond left facet -->
    <polygon points="260,280 400,240 400,510" fill="#5B34C4" opacity="0.8"/>
    <!-- Diamond right facet -->
    <polygon points="540,280 400,240 400,510" fill="#7C5AE8" opacity="0.7"/>
    <!-- Diamond top-left edge -->
    <polygon points="400,130 330,210 400,240" fill="#a78bfa" opacity="0.4"/>
    <!-- Diamond top-right edge -->
    <polygon points="400,130 470,210 400,240" fill="#8B5CF6" opacity="0.5"/>
    <!-- Shine highlight -->
    <polygon points="310,200 370,180 350,250 290,260" fill="#ffffff" opacity="0.15"/>
  </g>

  <!-- Lightning bolt inside diamond -->
  <g filter="url(#glow)">
    <path d="M420 200 L370 310 L405 310 L385 420 L445 280 L412 280 Z" fill="url(#boltGrad)" opacity="0.95"/>
    <path d="M420 200 L370 310 L405 310 L385 420 L445 280 L412 280 Z" fill="#fff" opacity="0.2"/>
  </g>

  <!-- Sparkles -->
  <circle cx="560" cy="180" r="4" fill="#fbbf24" opacity="0.8"/>
  <circle cx="580" cy="200" r="2.5" fill="#fbbf24" opacity="0.5"/>
  <circle cx="240" cy="190" r="3" fill="#a78bfa" opacity="0.7"/>
  <circle cx="220" cy="220" r="2" fill="#a78bfa" opacity="0.4"/>
  <circle cx="560" cy="400" r="3" fill="#8B5CF6" opacity="0.5"/>
  <circle cx="240" cy="380" r="2.5" fill="#8B5CF6" opacity="0.4"/>

  <!-- SS Text -->
  <text x="400" y="640" text-anchor="middle" font-family="'Inter','Segoe UI','Helvetica Neue',sans-serif" font-size="110" font-weight="900" letter-spacing="10" fill="#ffffff" filter="url(#textGlow)">SS</text>

  <!-- TOP-UP Text -->
  <text x="400" y="710" text-anchor="middle" font-family="'Inter','Segoe UI','Helvetica Neue',sans-serif" font-size="44" font-weight="700" letter-spacing="16" fill="#a78bfa">TOP-UP</text>

  <!-- Subtle tagline -->
  <text x="400" y="752" text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif" font-size="18" font-weight="500" letter-spacing="6" fill="#6b7280">DIAMOND STORE</text>
</svg>