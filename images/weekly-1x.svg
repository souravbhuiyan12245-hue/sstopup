<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b0764"/>
      <stop offset="50%" style="stop-color:#581c87"/>
      <stop offset="100%" style="stop-color:#1e0533"/>
    </linearGradient>
    <linearGradient id="gold2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <filter id="glow2"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="shadow2"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.5"/></filter>
  </defs>
  <rect width="400" height="250" rx="20" fill="url(#bg2)"/>
  <circle cx="320" cy="100" r="90" fill="rgba(168,85,247,0.15)"/>
  <!-- Card/Pass visual -->
  <rect x="250" y="50" width="110" height="140" rx="12" fill="#6d28d9" stroke="#a855f7" stroke-width="2" transform="rotate(8,305,120)"/>
  <text x="305" y="130" text-anchor="middle" fill="#fff" font-size="50" font-weight="900" font-family="Arial" transform="rotate(8,305,130)">W</text>
  <!-- Gems -->
  <polygon points="270,30 277,45 270,42 263,45" fill="url(#gold2)" filter="url(#glow2)"/>
  <polygon points="330,20 336,33 330,30 324,33" fill="url(#gold2)" opacity="0.8" filter="url(#glow2)"/>
  <!-- Sparkles -->
  <circle cx="360" cy="50" r="2" fill="#fbbf24" opacity="0.8"/>
  <circle cx="245" cy="40" r="1.5" fill="#fff" opacity="0.6"/>
  <!-- Bengali Text with golden style -->
  <text x="30" y="90" font-family="Arial, sans-serif" font-size="32" font-weight="900" fill="#fbbf24" filter="url(#shadow2)">Weekly</text>
  <text x="30" y="145" font-family="Arial, sans-serif" font-size="52" font-weight="900" fill="#fff" filter="url(#shadow2)" font-style="italic">Offer</text>
  <!-- Price -->
  <rect x="30" y="170" width="100" height="35" rx="18" fill="#8b5cf6"/>
  <text x="80" y="193" text-anchor="middle" font-family="Arial" font-size="18" font-weight="800" fill="#fff">৳250</text>
  <!-- Badge -->
  <rect x="330" y="10" width="60" height="24" rx="12" fill="#f97316"/>
  <text x="360" y="27" text-anchor="middle" font-family="Arial" font-size="11" font-weight="700" fill="#fff">HOT 🔥</text>
</svg>
