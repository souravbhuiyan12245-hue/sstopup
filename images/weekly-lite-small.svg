<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 220">
  <defs>
    <linearGradient id="bgWS" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f23"/>
    </linearGradient>
    <linearGradient id="gemWS" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#67e8f9"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <filter id="glowWS"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="300" height="220" rx="16" fill="url(#bgWS)"/>
  <circle cx="150" cy="60" r="50" fill="rgba(59,130,246,0.12)"/>
  <!-- Chest -->
  <rect x="100" y="40" width="100" height="65" rx="6" fill="#1e3a5f" stroke="#4a90d9" stroke-width="1.5"/>
  <path d="M100 52 L150 35 L200 52" fill="#162d50" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="150" y="82" text-anchor="middle" fill="#67e8f9" font-size="24" font-weight="900" font-family="Arial">W</text>
  <!-- Gems -->
  <polygon points="130,18 136,32 130,28 124,32" fill="url(#gemWS)" filter="url(#glowWS)"/>
  <polygon points="170,15 175,27 170,24 165,27" fill="url(#gemWS)" opacity="0.8" filter="url(#glowWS)"/>
  <polygon points="150,10 154,20 150,18 146,20" fill="#67e8f9" opacity="0.6"/>
  <!-- Text -->
  <text x="150" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="900" fill="#fff">উইকলি</text>
  <text x="150" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="900" fill="#67e8f9">লাইট</text>
</svg>
