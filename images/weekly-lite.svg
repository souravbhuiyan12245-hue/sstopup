<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a3e"/>
      <stop offset="50%" style="stop-color:#2d1b69"/>
      <stop offset="100%" style="stop-color:#0f0525"/>
    </linearGradient>
    <linearGradient id="gem1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#67e8f9"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <filter id="glow1"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="shadow1"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.5"/></filter>
  </defs>
  <rect width="400" height="250" rx="20" fill="url(#bg1)"/>
  <!-- Glow effects -->
  <circle cx="300" cy="80" r="80" fill="rgba(99,102,241,0.15)"/>
  <circle cx="100" cy="180" r="60" fill="rgba(59,130,246,0.1)"/>
  <!-- Chest -->
  <rect x="240" y="60" width="120" height="80" rx="8" fill="#1e3a5f" stroke="#4a90d9" stroke-width="2"/>
  <path d="M240 75 L300 50 L360 75" fill="#162d50" stroke="#4a90d9" stroke-width="2"/>
  <text x="300" y="115" text-anchor="middle" fill="#67e8f9" font-size="30" font-weight="900" font-family="Arial">W</text>
  <!-- Diamonds floating -->
  <polygon points="270,30 278,48 270,44 262,48" fill="url(#gem1)" filter="url(#glow1)"/>
  <polygon points="320,25 326,40 320,37 314,40" fill="url(#gem1)" opacity="0.8" filter="url(#glow1)"/>
  <polygon points="345,45 350,57 345,54 340,57" fill="url(#gem1)" opacity="0.6"/>
  <!-- Sparkles -->
  <circle cx="250" cy="45" r="2" fill="#fff" opacity="0.8"/>
  <circle cx="355" cy="35" r="1.5" fill="#fff" opacity="0.6"/>
  <circle cx="280" cy="140" r="1.5" fill="#67e8f9" opacity="0.5"/>
  <!-- Bengali Text -->
  <text x="30" y="100" font-family="Arial, sans-serif" font-size="42" font-weight="900" fill="#fff" filter="url(#shadow1)">উইকলি</text>
  <text x="30" y="155" font-family="Arial, sans-serif" font-size="42" font-weight="900" fill="#67e8f9" filter="url(#shadow1)">লাইট</text>
  <!-- Price tag -->
  <rect x="30" y="175" width="100" height="35" rx="18" fill="#f97316"/>
  <text x="80" y="198" text-anchor="middle" font-family="Arial" font-size="18" font-weight="800" fill="#fff">৳120</text>
  <!-- Badge -->
  <rect x="330" y="10" width="60" height="24" rx="12" fill="#ef4444"/>
  <text x="360" y="27" text-anchor="middle" font-family="Arial" font-size="11" font-weight="700" fill="#fff">OFFER</text>
</svg>
