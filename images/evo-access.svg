<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 220">
  <defs>
    <linearGradient id="bgE" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f23"/>
    </linearGradient>
    <linearGradient id="evoE" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#991b1b"/>
      <stop offset="100%" style="stop-color:#450a0a"/>
    </linearGradient>
    <filter id="glowE"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="300" height="220" rx="16" fill="url(#bgE)"/>
  <circle cx="150" cy="55" r="55" fill="rgba(239,68,68,0.1)"/>
  <!-- Shield/Hexagon -->
  <polygon points="150,10 200,35 200,80 150,105 100,80 100,35" fill="url(#evoE)" stroke="#fbbf24" stroke-width="2.5" filter="url(#glowE)"/>
  <polygon points="150,18 193,40 193,75 150,97 107,75 107,40" fill="none" stroke="#b91c1c" stroke-width="1"/>
  <text x="150" y="68" text-anchor="middle" fill="#fff" font-size="38" font-weight="900" font-family="Arial">E</text>
  <!-- Fire particles -->
  <circle cx="120" cy="15" r="3" fill="#ef4444" opacity="0.6"/>
  <circle cx="180" cy="12" r="2" fill="#f59e0b" opacity="0.5"/>
  <circle cx="200" cy="25" r="2.5" fill="#ef4444" opacity="0.4"/>
  <!-- Text -->
  <text x="150" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="900" fill="#fff">ইভো</text>
  <text x="150" y="193" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="900" fill="#ef4444">এক্সেস</text>
</svg>
