<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Learn English 🇬🇧 — বাংলা থেকে ইংরেজি শিখো</title>
    <meta name="description" content="বাংলা থেকে ইংরেজি শিখো — Vocabulary, Grammar, Quiz, Conversation Practice!">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --bg2: #1e293b;
            --bg3: #334155;
            --primary: #3b82f6;
            --primary-light: #60a5fa;
            --primary-glow: rgba(59,130,246,0.3);
            --accent: #10b981;
            --accent2: #f59e0b;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --danger: #ef4444;
            --success: #22c55e;
            --purple: #8b5cf6;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding-bottom:80px; }

        /* Header */
        .header { 
            background:linear-gradient(135deg,#1e40af,#3b82f6); padding:20px 16px; text-align:center;
            position:sticky; top:0; z-index:50;
        }
        .header h1 { font-size:1.2rem; font-weight:800; display:flex; align-items:center; justify-content:center; gap:8px; }
        .header .streak { font-size:0.75rem; color:rgba(255,255,255,0.8); margin-top:4px; }

        /* Bottom Nav */
        .bottom-nav {
            position:fixed; bottom:0; left:0; right:0; background:var(--bg2);
            display:flex; justify-content:space-around; padding:8px 0 12px; z-index:100;
            border-top:1px solid var(--bg3); backdrop-filter:blur(12px);
        }
        .nav-item { text-align:center; cursor:pointer; padding:4px 12px; transition:all 0.2s; }
        .nav-item .icon { font-size:1.3rem; }
        .nav-item .label { font-size:0.6rem; font-weight:600; color:var(--text-muted); margin-top:2px; }
        .nav-item.active .label { color:var(--primary-light); }
        .nav-item.active .icon { transform:scale(1.1); }

        /* Pages */
        .page { display:none; max-width:500px; margin:0 auto; padding:16px; }
        .page.active { display:block; animation:fadeIn 0.3s ease; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

        /* Cards */
        .card { background:var(--bg2); border:1px solid var(--bg3); border-radius:18px; padding:20px; margin-bottom:14px; }
        .card h3 { font-size:0.95rem; font-weight:700; margin-bottom:12px; display:flex; align-items:center; gap:8px; }

        /* Stats Row */
        .stats { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:16px; }
        .stat { background:var(--bg2); border:1px solid var(--bg3); border-radius:14px; padding:14px 8px; text-align:center; }
        .stat .num { font-size:1.4rem; font-weight:800; }
        .stat .lbl { font-size:0.65rem; color:var(--text-muted); margin-top:2px; }

        /* Word Card */
        .word-card {
            background:linear-gradient(135deg,#1e3a5f,#1e293b); border:1px solid var(--bg3);
            border-radius:20px; padding:28px 20px; text-align:center; margin-bottom:16px;
            position:relative; overflow:hidden;
        }
        .word-card .en { font-size:2rem; font-weight:900; color:#fff; margin-bottom:4px; }
        .word-card .pron { font-size:0.85rem; color:var(--primary-light); margin-bottom:8px; }
        .word-card .bn { font-size:1.1rem; color:var(--text-muted); margin-bottom:12px; }
        .word-card .type { display:inline-block; padding:4px 12px; border-radius:20px; font-size:0.7rem; font-weight:700; background:var(--primary-glow); color:var(--primary-light); }
        .word-card .example { font-size:0.82rem; color:var(--text-muted); margin-top:14px; font-style:italic; line-height:1.5; }
        .word-card .example b { color:var(--primary-light); font-style:normal; }

        /* Buttons */
        .btn { 
            width:100%; padding:14px; border:none; border-radius:14px; font-size:0.95rem; 
            font-weight:700; cursor:pointer; font-family:inherit; transition:all 0.2s;
        }
        .btn:active { transform:scale(0.97); }
        .btn-primary { background:linear-gradient(135deg,var(--primary),var(--primary-light)); color:#fff; box-shadow:0 4px 15px var(--primary-glow); }
        .btn-success { background:var(--success); color:#fff; }
        .btn-outline { background:transparent; border:2px solid var(--bg3); color:var(--text); }
        .btn-sm { width:auto; padding:10px 18px; font-size:0.8rem; border-radius:12px; display:inline-flex; align-items:center; gap:6px; }

        /* Quiz Options */
        .quiz-option {
            padding:14px 18px; border:2px solid var(--bg3); border-radius:14px; margin-bottom:10px;
            cursor:pointer; font-size:0.92rem; font-weight:600; transition:all 0.2s; text-align:left;
        }
        .quiz-option:hover { border-color:var(--primary); background:rgba(59,130,246,0.1); }
        .quiz-option.correct { border-color:var(--success); background:rgba(34,197,94,0.15); color:var(--success); }
        .quiz-option.wrong { border-color:var(--danger); background:rgba(239,68,68,0.15); color:var(--danger); }
        .quiz-option.disabled { pointer-events:none; }

        /* Category Chips */
        .chips { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
        .chip {
            padding:8px 16px; border-radius:20px; font-size:0.78rem; font-weight:600;
            cursor:pointer; background:var(--bg3); color:var(--text-muted); transition:all 0.2s;
        }
        .chip.active { background:var(--primary); color:#fff; }

        /* Lesson Item */
        .lesson-item {
            display:flex; align-items:center; gap:14px; padding:16px;
            background:var(--bg2); border:1px solid var(--bg3); border-radius:16px; margin-bottom:10px;
            cursor:pointer; transition:all 0.2s;
        }
        .lesson-item:hover { border-color:var(--primary); }
        .lesson-item .emoji { font-size:1.8rem; }
        .lesson-item .info { flex:1; }
        .lesson-item .info .title { font-weight:700; font-size:0.9rem; }
        .lesson-item .info .desc { font-size:0.75rem; color:var(--text-muted); margin-top:2px; }
        .lesson-item .arrow { color:var(--text-muted); }

        /* Conversation */
        .chat-bubble {
            max-width:80%; padding:12px 16px; border-radius:16px; margin-bottom:10px;
            font-size:0.88rem; line-height:1.5; position:relative;
        }
        .chat-bubble.bot { background:var(--bg3); border-bottom-left-radius:4px; align-self:flex-start; }
        .chat-bubble.user { background:var(--primary); color:#fff; border-bottom-right-radius:4px; align-self:flex-end; margin-left:auto; }
        .chat-bubble .trans { font-size:0.75rem; color:var(--text-muted); margin-top:4px; }
        .chat-area { display:flex; flex-direction:column; gap:4px; }

        /* Speak Button */
        .speak-btn {
            background:none; border:none; cursor:pointer; font-size:1.2rem; padding:4px;
            transition:transform 0.2s;
        }
        .speak-btn:active { transform:scale(1.2); }

        /* Progress Bar */
        .progress { height:6px; background:var(--bg3); border-radius:10px; overflow:hidden; margin-bottom:12px; }
        .progress-fill { height:100%; border-radius:10px; transition:width 0.5s ease; background:linear-gradient(90deg,var(--primary),var(--accent)); }

        /* Toast */
        .toast {
            position:fixed; top:20px; left:50%; transform:translateX(-50%);
            padding:12px 24px; border-radius:14px; font-size:0.85rem; font-weight:600;
            z-index:200; display:none; box-shadow:0 8px 24px rgba(0,0,0,0.4);
        }
        .toast.success { background:var(--success); color:#fff; }
        .toast.error { background:var(--danger); color:#fff; }

        /* Flip Card */
        .flip-container { perspective:1000px; margin-bottom:16px; cursor:pointer; }
        .flip-card { transition:transform 0.6s; transform-style:preserve-3d; position:relative; min-height:200px; }
        .flip-card.flipped { transform:rotateY(180deg); }
        .flip-front, .flip-back {
            position:absolute; width:100%; backface-visibility:hidden;
            background:var(--bg2); border:1px solid var(--bg3); border-radius:20px; padding:28px 20px; text-align:center;
        }
        .flip-back { transform:rotateY(180deg); }

        /* Level Badge */
        .level-badge {
            display:inline-flex; align-items:center; gap:6px; padding:6px 14px;
            border-radius:20px; font-size:0.75rem; font-weight:700;
        }
        .level-beginner { background:rgba(34,197,94,0.15); color:var(--success); }
        .level-intermediate { background:rgba(245,158,11,0.15); color:var(--accent2); }
        .level-advanced { background:rgba(139,92,246,0.15); color:var(--purple); }

        /* Typing input */
        .type-input {
            width:100%; padding:14px 16px; border:2px solid var(--bg3); border-radius:14px;
            font-size:1rem; font-family:inherit; outline:none; background:var(--bg);
            color:var(--text); margin-bottom:12px; transition:border 0.2s;
        }
        .type-input:focus { border-color:var(--primary); }
        .type-input::placeholder { color:#475569; }
    </style>
</head>
<body>

<!-- Header -->
<div class="header">
    <h1>🇬🇧 Learn English</h1>
    <div class="streak" id="streakText">🔥 0 দিন streak | 0 শব্দ শিখেছো</div>
</div>

<!-- Home Page -->

    <!-- Quick Actions -->

        <button class="btn btn-primary btn-sm" onclick="goPage('vocab')" style="width:100%;justify-content:center;">📚 Vocabulary</button>
        <button class="btn btn-success btn-sm" onclick="goPage('quiz')" style="width:100%;justify-content:center;">🧠 Quiz</button>

    </div>

</div>

<!-- Vocabulary Page -->
<div class="page" id="page-vocab">

    <div id="vocabList"></div>
    <div style="text-align:center;margin-top:12px;">

    </div>
</div>

<!-- Quiz Page -->
<div class="page" id="page-quiz">
    <div class="card" id="quizCard">
        <div class="progress"><div class="progress-fill" id="quizProgress" style="width:0%"></div></div>
        <div id="quizContent">

            <p style="text-align:center;color:var(--text-muted);margin-bottom:20px;">তোমার ইংরেজি জ্ঞান পরীক্ষা করো</p>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
                <button class="btn btn-primary btn-sm" style="width:100%;justify-content:center;" onclick="startQuiz('bn2en')">🇧🇩→🇬🇧 বাংলা→ইংরেজি</button>
                <button class="btn btn-success btn-sm" style="width:100%;justify-content:center;" onclick="startQuiz('en2bn')">🇬🇧→🇧🇩 ইংরেজি→বাংলা</button>
                <button class="btn btn-outline btn-sm" style="width:100%;justify-content:center;" onclick="startQuiz('fill')">✏️ Fill in Blank</button>
                <button class="btn btn-outline btn-sm" style="width:100%;justify-content:center;" onclick="startQuiz('listen')">🔊 শুনে বলো</button>
            </div>
        </div>
    </div>
    <div id="quizResult" style="display:none;"></div>
</div>

<!-- Grammar Page -->
<div class="page" id="page-grammar">
    <h3 style="margin-bottom:16px;">📝 Grammar Lessons</h3>
    <div id="grammarList"></div>
</div>

<!-- Grammar Detail -->
<div class="page" id="page-grammar-detail">
    <button class="btn btn-outline btn-sm" onclick="goPage('grammar')" style="margin-bottom:16px;">← Back</button>
    <div id="grammarContent"></div>
</div>

<!-- Chat Practice Page -->
<div class="page" id="page-chat">
    <div class="chips" id="chatChips"></div>
    <div class="card">

        <div class="chat-area" id="chatArea"></div>
        <div style="margin-top:12px;" id="chatOptions"></div>
    </div>
</div>

<!-- Bottom Nav -->
<div class="bottom-nav">
    <div class="nav-item active" onclick="goPage('home')"><div class="icon">🏠</div><div class="label">Home</div></div>
    <div class="nav-item" onclick="goPage('vocab')"><div class="icon">📚</div><div class="label">Vocab</div></div>

    <div class="nav-item" onclick="goPage('grammar')"><div class="icon">📝</div><div class="label">Grammar</div></div>
    <div class="nav-item" onclick="goPage('chat')"><div class="icon">💬</div><div class="label">Chat</div></div>
</div>

<div class="toast" id="toast"></div>

// ============ APP STATE ============
let state = JSON.parse(localStorage.getItem('eng_learn_state') || '{}');
if (!state.wordsLearned) state.wordsLearned = [];
if (!state.streak) state.streak = 0;
if (!state.lastDate) state.lastDate = '';
if (!state.quizScore) state.quizScore = { correct:0, total:0 };
if (!state.currentCat) state.currentCat = 'দৈনন্দিন';

function saveState() { localStorage.setItem('eng_learn_state', JSON.stringify(state)); }

// Check streak
const today = new Date().toISOString().split('T')[0];
if (state.lastDate !== today) {
    const yesterday = new Date(Date.now()-86400000).toISOString().split('T')[0];
    if (state.lastDate === yesterday) { state.streak++; }
    else if (state.lastDate && state.lastDate !== today) { state.streak = 1; }
    else if (!state.lastDate) { state.streak = 1; }
    state.lastDate = today;
    saveState();
}

// ============ NAVIGATION ============
function goPage(name) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById('page-'+name).classList.add('active');
    const navIdx = {home:0,vocab:1,quiz:2,grammar:3,chat:4};
    if (navIdx[name] !== undefined) document.querySelectorAll('.nav-item')[navIdx[name]].classList.add('active');
    if (name==='vocab') renderVocab();
    if (name==='grammar') renderGrammar();
    if (name==='chat') renderChat();
}

    document.getElementById('statWords').textContent = state.wordsLearned.length;
    document.getElementById('statStreak').textContent = state.streak;
    const pct = state.quizScore.total > 0 ? Math.round(state.quizScore.correct/state.quizScore.total*100) : 0;
    document.getElementById('statQuiz').textContent = pct+'%';
    document.getElementById('streakText').textContent = `🔥 ${state.streak} দিন streak | ${state.wordsLearned.length} শব্দ শিখেছো`;

    // Today's word
    const allWords = Object.values(vocab).flat();
    const wordOfDay = allWords[Math.floor(new Date().getDate() * 7.3) % allWords.length];
    document.getElementById('todayWord').innerHTML = renderWordCard(wordOfDay);

    // Daily challenge
    renderDailyChallenge();
}

function renderWordCard(w) {
    const learned = state.wordsLearned.includes(w.en);
    return `<div class="word-card">
        <div style="display:flex;justify-content:space-between;align-items:center;">
            <span class="type">${w.type}</span>
            <button class="speak-btn" onclick="speak('${w.en}')">🔊</button>
        </div>
        <div class="en">${w.en}</div>
        <div class="pron">/${w.pron}/</div>
        <div class="bn">${w.bn}</div>
        <div class="example">${w.ex}</div>
        <button class="btn ${learned?'btn-success':'btn-primary'}" style="margin-top:14px;" onclick="markLearned('${w.en}',this)">
            ${learned?'✅ শিখেছো!':'📖 শিখে ফেললাম!'}
        </button>
    </div>`;
}

function markLearned(word, btn) {
    if (!state.wordsLearned.includes(word)) {
        state.wordsLearned.push(word);
        saveState();
        btn.textContent = '✅ শিখেছো!';
        btn.className = 'btn btn-success';
        btn.style.marginTop = '14px';
        renderHome();
        toast('🎉 নতুন শব্দ শিখেছো!', 'success');
    }
}

function speak(text) {
    if ('speechSynthesis' in window) {
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'en-US';
        u.rate = 0.8;
        speechSynthesis.speak(u);
    }
}

// ============ DAILY CHALLENGE ============
function renderDailyChallenge() {
    const allWords = Object.values(vocab).flat();
    const idx = Math.floor(new Date().getDate() * 13.7) % allWords.length;
    const w = allWords[idx];
    const wrongs = allWords.filter(x => x.en !== w.en).sort(() => Math.random()-0.5).slice(0,3);
    const opts = [...wrongs.map(x => x.en), w.en].sort(() => Math.random()-0.5);

    document.getElementById('dailyChallengeText').textContent = `"${w.bn}" ইংরেজিতে কী?`;
    document.getElementById('dailyChallengeArea').innerHTML = opts.map(o =>
        `<div class="quiz-option" onclick="checkDaily(this,'${o}','${w.en}')">${o}</div>`
    ).join('');
}

function checkDaily(el, selected, correct) {
    document.querySelectorAll('#dailyChallengeArea .quiz-option').forEach(o => {
        o.classList.add('disabled');
        if (o.textContent === correct) o.classList.add('correct');
    });
    if (selected !== correct) el.classList.add('wrong');
    else toast('🎉 সঠিক!', 'success');
}

// ============ VOCABULARY ============
let vocabPage = 0;
function renderVocab() {
    const cats = Object.keys(vocab);
    document.getElementById('vocabChips').innerHTML = cats.map(c =>
        `<div class="chip ${c===state.currentCat?'active':''}" onclick="switchCat('${c}')">${c}</div>`
    ).join('');
    vocabPage = 0;
    renderVocabList();
}

function switchCat(cat) {
    state.currentCat = cat;
    saveState();
    vocabPage = 0;
    renderVocab();
}

function renderVocabList() {
    const words = vocab[state.currentCat] || [];
    const show = words.slice(0, (vocabPage+1)*6);
    document.getElementById('vocabList').innerHTML = show.map(w => renderWordCard(w)).join('');
}

function loadMoreVocab() {
    vocabPage++;
    renderVocabList();
}

// ============ QUIZ ============
let quizQs=[], quizIdx=0, quizCorrect=0, quizType='';

function startQuiz(type) {
    quizType = type;
    quizIdx = 0;
    quizCorrect = 0;
    const allWords = Object.values(vocab).flat();
    quizQs = allWords.sort(() => Math.random()-0.5).slice(0, 10);
    document.getElementById('quizResult').style.display = 'none';
    renderQuizQ();
}

function renderQuizQ() {
    if (quizIdx >= quizQs.length) { showQuizResult(); return; }
    const w = quizQs[quizIdx];
    const allWords = Object.values(vocab).flat();
    const pct = Math.round((quizIdx/quizQs.length)*100);
    document.getElementById('quizProgress').style.width = pct+'%';

    let question, options, correctAnswer;

    if (quizType === 'bn2en') {
        question = `"${w.bn}" ইংরেজিতে কী?`;
        correctAnswer = w.en;
        const wrongs = allWords.filter(x=>x.en!==w.en).sort(()=>Math.random()-0.5).slice(0,3);
        options = [...wrongs.map(x=>x.en), w.en].sort(()=>Math.random()-0.5);
    } else if (quizType === 'en2bn') {
        question = `"${w.en}" বাংলায় কী?`;
        correctAnswer = w.bn;
        const wrongs = allWords.filter(x=>x.bn!==w.bn).sort(()=>Math.random()-0.5).slice(0,3);
        options = [...wrongs.map(x=>x.bn), w.bn].sort(()=>Math.random()-0.5);
    } else if (quizType === 'fill') {
        const sentence = w.ex.replace(/<b>/g,'').replace(/<\/b>/g,'');
        const blank = sentence.replace(new RegExp(w.en,'i'), '_____');
        question = `খালি ঘর পূরণ করো: "${blank}"`;
        correctAnswer = w.en;
        const wrongs = allWords.filter(x=>x.en!==w.en).sort(()=>Math.random()-0.5).slice(0,3);
        options = [...wrongs.map(x=>x.en), w.en].sort(()=>Math.random()-0.5);
    } else {
        // Listen
        question = `🔊 শুনো এবং সঠিক বাংলা অর্থ বলো:`;
        correctAnswer = w.bn;
        speak(w.en);
        const wrongs = allWords.filter(x=>x.bn!==w.bn).sort(()=>Math.random()-0.5).slice(0,3);
        options = [...wrongs.map(x=>x.bn), w.bn].sort(()=>Math.random()-0.5);
    }

    document.getElementById('quizContent').innerHTML = `
        <div style="text-align:center;margin-bottom:8px;font-size:0.8rem;color:var(--text-muted);">প্রশ্ন ${quizIdx+1}/${quizQs.length}</div>
        <p style="font-size:1rem;font-weight:700;text-align:center;margin-bottom:20px;line-height:1.5;">${question}</p>
        ${quizType==='listen'?`<button class="btn btn-outline btn-sm" onclick="speak('${w.en}')" style="margin:0 auto 16px;display:flex;">🔊 আবার শুনো</button>`:''}
        ${options.map(o => `<div class="quiz-option" onclick="checkQuiz(this,'${o.replace(/'/g,"\\'")}','${correctAnswer.replace(/'/g,"\\'")}')">${o}</div>`).join('')}
    `;
}

function checkQuiz(el, selected, correct) {
    document.querySelectorAll('#quizContent .quiz-option').forEach(o => {
        o.classList.add('disabled');
        if (o.textContent === correct) o.classList.add('correct');
    });
    if (selected === correct) {
        quizCorrect++;
        state.quizScore.correct++;
    } else {
        el.classList.add('wrong');
    }
    state.quizScore.total++;
    saveState();

    setTimeout(() => { quizIdx++; renderQuizQ(); }, 1200);
}

function showQuizResult() {
    const pct = Math.round(quizCorrect/quizQs.length*100);
    document.getElementById('quizProgress').style.width = '100%';
    let emoji, msg;
    if (pct >= 90) { emoji='🏆'; msg='অসাধারণ! তুমি ইংরেজি মাস্টার!'; }
    else if (pct >= 70) { emoji='🌟'; msg='বেশ ভালো! আরেকটু প্র্যাকটিস করো!'; }
    else if (pct >= 50) { emoji='💪'; msg='ভালো চেষ্টা! আরো শিখতে থাকো!'; }
    else { emoji='📚'; msg='আরো শব্দ শেখো, তারপর আবার try করো!'; }

    document.getElementById('quizContent').innerHTML = `
        <div style="text-align:center;">
            <div style="font-size:4rem;margin-bottom:12px;">${emoji}</div>
            <div style="font-size:2.5rem;font-weight:900;color:var(--primary);margin-bottom:8px;">${pct}%</div>
            <div style="font-size:1rem;font-weight:700;margin-bottom:8px;">${quizCorrect}/${quizQs.length} সঠিক</div>
            <p style="color:var(--text-muted);margin-bottom:20px;">${msg}</p>
            <button class="btn btn-primary" onclick="goPage('quiz')">🔄 আবার খেলো</button>
        </div>
    `;
    renderHome();
}

// ============ GRAMMAR ============
function renderGrammar() {
    document.getElementById('grammarList').innerHTML = grammarLessons.map((l,i) => `
        <div class="lesson-item" onclick="showGrammar(${i})">
            <div class="emoji">${l.emoji}</div>
            <div class="info">
                <div class="title">${l.title}</div>
                <div class="desc">${l.desc}</div>
                <span class="level-badge level-${l.level}" style="margin-top:6px;">${l.level==='beginner'?'🟢 সহজ':l.level==='intermediate'?'🟡 মাঝারি':'🔴 কঠিন'}</span>
            </div>
            <div class="arrow">→</div>
        </div>
    `).join('');
}

function showGrammar(idx) {
    const l = grammarLessons[idx];
    document.getElementById('grammarContent').innerHTML = `
        <h2 style="font-size:1.2rem;font-weight:800;margin-bottom:16px;">${l.emoji} ${l.title}</h2>
        ${l.content}
    `;
    goPage('grammar-detail');
}

// ============ CHAT PRACTICE ============
let chatScenario='', chatStep=0;

function renderChat() {
    const cats = Object.keys(conversations);
    document.getElementById('chatChips').innerHTML = cats.map(c =>
        `<div class="chip ${c===chatScenario?'active':''}" onclick="startChat('${c}')">${c}</div>`
    ).join('');
    if (!chatScenario) startChat(cats[0]);
}

function startChat(scenario) {
    chatScenario = scenario;
    chatStep = 0;
    renderChat();
    renderChatStep();
}

function renderChatStep() {
    const conv = conversations[chatScenario];
    if (!conv || chatStep >= conv.length) {
        document.getElementById('chatArea').innerHTML += `<div class="chat-bubble bot">🎉 দারুণ! Conversation শেষ! তুমি ভালো করেছো!</div>`;
        document.getElementById('chatOptions').innerHTML = `<button class="btn btn-primary" onclick="startChat('${chatScenario}')">🔄 আবার শুরু করো</button>`;
        return;
    }
    const step = conv[chatStep];
    const area = document.getElementById('chatArea');
    if (chatStep === 0) area.innerHTML = '';

    area.innerHTML += `<div class="chat-bubble bot">${step.bot}<div class="trans">${step.botBn}</div></div>`;

    document.getElementById('chatOptions').innerHTML = step.options.map(o =>
        `<button class="btn btn-outline" style="margin-bottom:8px;text-align:left;" onclick="chatReply(this,'${o.en.replace(/'/g,"\\'")}','${o.bn.replace(/'/g,"\\'")}')">
            🇬🇧 ${o.en}<br><span style="font-size:0.75rem;color:var(--text-muted);">🇧🇩 ${o.bn}</span>
        </button>`
    ).join('');

    area.scrollTop = area.scrollHeight;
}

function chatReply(btn, en, bn) {
    const area = document.getElementById('chatArea');
    area.innerHTML += `<div class="chat-bubble user">${en}<div class="trans" style="color:rgba(255,255,255,0.7);">${bn}</div></div>`;
    speak(en);
    chatStep++;
    setTimeout(() => renderChatStep(), 800);
}

// ============ UTILS ============
function toast(text, type) {
    const el = document.getElementById('toast');
    el.textContent = text;
    el.className = 'toast ' + (type||'success');
    el.style.display = 'block';
    setTimeout(() => el.style.display='none', 2500);
}

// ============ INIT ============
renderHome();
</script>
</body>
</html>
