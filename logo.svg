<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff2d00;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="diamond" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e5ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2979ff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="200" cy="200" r="190" fill="url(#bg)" />
  <circle cx="200" cy="200" r="180" fill="none" stroke="#fff" stroke-width="3" opacity="0.3"/>
  
  <!-- Diamond shape -->
  <polygon points="200,80 260,160 200,260 140,160" fill="url(#diamond)" filter="url(#glow)" opacity="0.9"/>
  <polygon points="200,95 248,160 200,245 152,160" fill="none" stroke="#fff" stroke-width="2" opacity="0.5"/>
  
  <!-- SS text -->
  <text x="200" y="185" font-family="Arial Black, Arial, sans-serif" font-size="72" font-weight="900" fill="#ffffff" text-anchor="middle" filter="url(#glow)">SS</text>
  
  <!-- TOP-UP text -->
  <text x="200" y="320" font-family="Arial Black, Arial, sans-serif" font-size="40" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="4">TOP-UP</text>
  
  <!-- Small diamond accents -->
  <polygon points="90,290 100,275 110,290 100,305" fill="#00e5ff" opacity="0.6"/>
  <polygon points="290,290 300,275 310,290 300,305" fill="#00e5ff" opacity="0.6"/>
</svg>