<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#ea580c"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <linearGradient id="diamondGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="50%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0284c7"/>
    </linearGradient>
    <linearGradient id="shineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="orangeGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feFlood flood-color="#f97316" flood-opacity="0.4"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bgGrad)"/>
  
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="url(#orangeGrad)" stroke-width="3" opacity="0.3"/>
  
  <!-- Inner glow circle -->
  <circle cx="256" cy="220" r="120" fill="url(#orangeGrad)" opacity="0.06"/>
  
  <!-- Diamond -->
  <g filter="url(#glow2)">
    <!-- Diamond body -->
    <polygon points="256,70 330,170 256,290 182,170" fill="url(#diamondGrad)"/>
    <!-- Diamond top facet -->
    <polygon points="256,70 330,170 256,150 182,170" fill="url(#shineGrad)"/>
    <!-- Diamond left facet -->
    <polygon points="182,170 256,150 256,290" fill="#0891b2" opacity="0.6"/>
    <!-- Diamond right facet -->
    <polygon points="330,170 256,150 256,290" fill="#06b6d4" opacity="0.8"/>
    <!-- Diamond outline -->
    <polygon points="256,70 330,170 256,290 182,170" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.3"/>
    <line x1="256" y1="70" x2="256" y2="290" stroke="#fff" stroke-width="1" opacity="0.2"/>
    <line x1="182" y1="170" x2="330" y2="170" stroke="#fff" stroke-width="1" opacity="0.2"/>
  </g>
  
  <!-- SS Text -->
  <g filter="url(#orangeGlow)">
    <text x="256" y="210" font-family="Arial Black, Impact, sans-serif" font-size="90" font-weight="900" fill="#fff" text-anchor="middle" letter-spacing="8">SS</text>
  </g>
  
  <!-- TOP-UP Text -->
  <rect x="126" y="330" width="260" height="48" rx="24" fill="url(#orangeGrad)" filter="url(#shadow)"/>
  <text x="256" y="362" font-family="Arial Black, Impact, sans-serif" font-size="30" font-weight="900" fill="#fff" text-anchor="middle" letter-spacing="6">TOP-UP</text>
  
  <!-- Lightning bolt accent -->
  <g transform="translate(370, 100)" filter="url(#glow2)">
    <polygon points="12,0 0,18 8,18 4,32 18,12 10,12" fill="#f97316"/>
  </g>
  
  <!-- Small diamond accents -->
  <polygon points="100,320 108,306 116,320 108,334" fill="#06b6d4" opacity="0.5"/>
  <polygon points="396,320 404,306 412,320 404,334" fill="#06b6d4" opacity="0.5"/>
  
  <!-- Sparkle dots -->
  <circle cx="140" cy="120" r="3" fill="#f97316" opacity="0.6"/>
  <circle cx="380" cy="140" r="2.5" fill="#06b6d4" opacity="0.5"/>
  <circle cx="120" cy="250" r="2" fill="#f97316" opacity="0.4"/>
  <circle cx="400" cy="230" r="2" fill="#06b6d4" opacity="0.4"/>
</svg>
